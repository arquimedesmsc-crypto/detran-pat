<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo branco -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- Gradiente azul-verde do DETRAN -->
  <defs>
    <linearGradient id="detranGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00AA44;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo com gradiente -->
  <circle cx="100" cy="100" r="95" fill="url(#detranGradient)"/>
  
  <!-- Letra D estilizada -->
  <g fill="white" font-family="Arial, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" dominant-baseline="middle">
    <text x="100" y="105">D</text>
  </g>
</svg>
